<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathique - Öğretmen Paneli</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#F7FBF9;min-height:100vh;padding:32px 20px;color:#28433A}
.wrap{max-width:880px;margin:0 auto}
h1{font-family:'Baloo 2',sans-serif;font-size:26px;color:#2DAF78;margin-bottom:6px}
.sub{color:#5C7A6E;font-weight:700;font-size:13.5px;margin-bottom:28px}
.card{background:#fff;border-radius:20px;padding:26px;margin-bottom:22px;box-shadow:0 8px 24px rgba(45,175,120,.08);border:2px solid #E8F5EE}
.card h2{font-size:17px;font-weight:800;margin-bottom:14px;color:#28433A}
.upload-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
input[type=file]{display:none}
.btn{padding:11px 22px;border-radius:50px;font-weight:800;font-size:14px;font-family:'Nunito',sans-serif;border:2px solid #2DAF78;background:#fff;color:#2DAF78;cursor:pointer;transition:all .2s}
.btn:hover{background:#2DAF78;color:#fff}
.status{font-size:13.5px;font-weight:700;color:#5C7A6E}
.status.ok{color:#2DAF78}
.status.err{color:#E8658A}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;padding:10px 12px;background:#E3FBF0;color:#2DAF78;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
td{padding:10px 12px;border-bottom:1px solid #EEF7F2;font-weight:600}
tr:hover td{background:#FAFFFC}
.badge{padding:3px 10px;border-radius:50px;font-size:11.5px;font-weight:800}
.badge.ok{background:#E3FBF0;color:#2DAF78}
.badge.no{background:#FBEAEE;color:#E8658A}
.empty-msg{color:#9AAFA6;font-weight:700;text-align:center;padding:30px 0;font-size:14px}
.refresh-btn{font-size:12.5px;padding:7px 16px}
.table-wrap{max-height:480px;overflow-y:auto;border-radius:12px}
.name-cell{font-weight:800;color:#28433A}
.problem-cell{max-width:260px;font-size:12.5px;color:#5C7A6E}
</style>
</head>
<body>
<div class="wrap">
  <h1>🦉 Mathique — Öğretmen Paneli</h1>
  <div class="sub">Soruları yönet ve öğrenci ilerlemesini takip et</div>

  <div class="card">
    <h2>📤 Soru Yükle (Excel)</h2>
    <div class="upload-row">
      <label class="btn" for="xlsxFile">Excel Dosyası Seç</label>
      <input type="file" id="xlsxFile" accept=".xlsx,.xls">
      <span class="status" id="fileStatus">Henüz dosya seçilmedi</span>
    </div>
  </div>

  <div class="card">
    <h2>👩‍🎓 Öğrenci İlerlemesi <button class="btn refresh-btn" id="refreshBtn" style="margin-left:10px">🔄 Yenile</button></h2>
    <div class="table-wrap">
      <table id="attemptsTable">
        <thead>
          <tr>
            <th>Öğrenci</th>
            <th>Problem</th>
            <th>Cevap</th>
            <th>Deneme #</th>
            <th>Sonuç</th>
            <th>Zaman</th>
          </tr>
        </thead>
        <tbody id="attemptsBody"></tbody>
      </table>
      <div class="empty-msg" id="emptyMsg" style="display:none">Henüz kayıt yok.</div>
    </div>
  </div>
</div>

<script>
document.getElementById('xlsxFile').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const wb = XLSX.read(ev.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      const questions = rows.map(function(r){
        return {
          problem: String(r['problem']||r['Problem']||r['soru']||r['Soru']||''),
          secenekler: [
            String(r['A']||r['a']||''),
            String(r['B']||r['b']||''),
            String(r['C']||r['c']||''),
            String(r['D']||r['d']||'')
          ]
        };
      }).filter(function(q){ return q.problem; });

      if(questions.length === 0){
        document.getElementById('fileStatus').textContent = 'Sütunlar bulunamadı: problem, A, B, C, D';
        document.getElementById('fileStatus').className = 'status err';
        return;
      }

      fetch('/api/questions', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({questions: questions})
      })
      .then(function(res){ return res.json(); })
      .then(function(data){
        if(data.success){
          document.getElementById('fileStatus').textContent = '✅ ' + questions.length + ' soru yüklendi: ' + file.name;
          document.getElementById('fileStatus').className = 'status ok';
        } else {
          document.getElementById('fileStatus').textContent = 'Hata: ' + (data.error || 'bilinmeyen hata');
          document.getElementById('fileStatus').className = 'status err';
        }
      });
    }catch(err){
      document.getElementById('fileStatus').textContent = 'Hata: ' + err.message;
      document.getElementById('fileStatus').className = 'status err';
    }
  };
  reader.readAsBinaryString(file);
});

function loadAttempts(){
  fetch('/api/attempts')
    .then(function(res){ return res.json(); })
    .then(function(data){
      const body = document.getElementById('attemptsBody');
      const emptyMsg = document.getElementById('emptyMsg');
      body.innerHTML = '';
      const attempts = data.attempts || [];
      if(attempts.length === 0){
        emptyMsg.style.display = 'block';
        return;
      }
      emptyMsg.style.display = 'none';
      attempts.forEach(function(a){
        const tr = document.createElement('tr');
        const date = a.created_at ? new Date(a.created_at).toLocaleString('tr-TR') : '-';
        tr.innerHTML =
          '<td class="name-cell">' + a.student_name + '</td>' +
          '<td class="problem-cell">' + a.problem_text + '</td>' +
          '<td>' + a.selected_answer + '</td>' +
          '<td>' + a.attempt_number + '</td>' +
          '<td><span class="badge ' + (a.is_correct ? 'ok' : 'no') + '">' + (a.is_correct ? 'Doğru' : 'Yanlış') + '</span></td>' +
          '<td>' + date + '</td>';
        body.appendChild(tr);
      });
    });
}

document.getElementById('refreshBtn').addEventListener('click', loadAttempts);
loadAttempts();
</script>
</body>
</html>
